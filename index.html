<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex">
      <!--Profil Kısmı-->
      <div class="w-2/5 bg-[#456882] h-screen text-center">
        <p id="profilSecim" class="text-4xl mb-4">Profilinizi Oluşturun</p>
        <input
          id="ad"
          placeholder="Adınızı Girin..."
          class="text-3xl border-spacing-2 rounded-sm p-1 mb-3 text-white"
        />
        <h2 id="seviyeGosterge" class="text-3xl mb-3">Seviye: 1</h2>
        <h3 id="disiplinGosterge" class="text-3xl mb-3">Disiplin Puanı: 0</h3>
        <div>
          <input
            id="limit"
            placeholder="Aylık Limitinizi Giriniz"
            class="text-3xl border-spacing-2 rounded-sm p-1 mb-3 text-white"
          />
          <button
            id="gonderLimit"
            class="text-3xl mb-3 hover:bg-teal-800 p-2 rounded-sm"
          >
            Gönder
          </button>
        </div>
        <p class="text-3xl mb-3" id="limitGosterge">Aylık Limitiniz:</p>
        <div class="flex justify-center gap-8">
          <input
            id="harcama"
            placeholder="Harcamalarınızı Girin"
            class="text-3xl mb-3 text-white"
          />
          <button
            id="gonderHarcama"
            class="text-3xl mb-3 hover:bg-teal-800 p-2 rounded-sm"
          >
            Gönder
          </button>
        </div>
        <p class="text-3xl mb-3" id="harcamaGosterge">
          Aylık Toplam Harcamanız:
        </p>
        <button
          id="ayıKapat"
          class="text-3xl mb-3 hover:bg-teal-800 p-2 rounded-sm"
        >
          Ayı kapat
        </button>
      </div>
      <!--Sağ taraftaki bar kısmı-->
      <div
        id="bar"
        class="w-3/5 bg-slate-300 h-screen p-20 flex flex-col justify-center"
      >
        <h2 class="text-center text-6xl mb-20">Bütçe Kapasitesi</h2>

        <div class="relative w-full">
          <p
            id="guncelYuzdeMetni"
            class="absolute -top-12 text-4xl font-black text-[#1B3C53] transition-all duration-500 transform -translate-x-1/2"
            style="left: 0%"
          >
            %0
          </p>

          <div class="bg-slate-400 rounded-full h-10 w-full overflow-hidden">
            <div
              id="butceBar"
              class="bg-[#1B3C53] h-full transition-all duration-500"
              style="width: 0%"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
